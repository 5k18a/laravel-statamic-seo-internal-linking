<head>
  <!-- Basic Meta Tags -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="csrf-token" content="{{ csrf_token }}">
  <meta name="app-env" content="{{ config:app.env }}">
  {{ seo_pro:meta }}

  <!-- Project Favicon -->
  {{ setting }}
  <link rel="icon" href="{{ favicon }}{{ url }}{{ /favicon }}" type="image/gif" />
  {{ /setting }}
  <!-- All device viewport meta -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100;200;300;400;500;600;700;800;900&family=Syne:wght@400;500;600;700;800&display=swap"
  rel="stylesheet" />
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" type="text/css" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

  <!-- Custom Libraries Styles -->
  <!-- Swiper Slider Styles -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
  <!-- International Telephone Input Styles -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/css/intlTelInput.css" />
  <!-- AOS (Animate On Scroll) Styles -->
  <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />

  <!-- Theme Fonts -->
  <link rel="stylesheet" href="{{ theme:asset src='assets/css/all-fontawesome.min.css' }}?v={{ now format="YmdHis" }}">
  <!-- Custom Styles -->
  <link href="{{ theme:asset src='assets/css/output.css' }}?v={{ now format="YmdHis" }}" rel="stylesheet" />
  <!-- CMS content link styles (blog Bard, free_text_section, wysiwyg_html_block only) -->
  <style>
    .cms-content a:not([class]),
    .blog-details-content a:not([class]) {
      color: var(--color-primary-900);
      text-decoration: underline;
    }
    .cms-content a:not([class]):hover,
    .blog-details-content a:not([class]):hover {
      color: #2563eb;
    }
  </style>
  {{ super_admin_toolbar }}
</head>
