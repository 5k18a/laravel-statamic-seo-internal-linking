<details class="language-switcher relative shrink-0 group">
  <summary
    class="flex min-w-[74px] cursor-pointer list-none items-center justify-between gap-2 rounded-full border border-black/15 bg-white px-3 py-2 text-[11px] font-medium leading-none text-black transition-all hover:border-primary-900 hover:text-primary-900 marker:content-none">
    <span>{{ site:short_locale | upper }}</span>
    <svg
      class="h-3 w-3 transition-transform duration-200 group-open:rotate-180"
      viewBox="0 0 12 12"
      fill="none"
      xmlns="http://www.w3.org/2000/svg"
      aria-hidden="true">
      <path
        d="M2 4.5L6 8L10 4.5"
        stroke="currentColor"
        stroke-width="1.4"
        stroke-linecap="round"
        stroke-linejoin="round" />
    </svg>
  </summary>

  <div
    class="absolute right-0 top-[calc(100%+10px)] z-50 min-w-[160px] overflow-hidden rounded-[20px] border border-black/10 bg-white p-2 shadow-[0_18px_50px_0_rgba(0,0,0,0.12)]">
    <div class="flex flex-col gap-1" aria-label="Language switcher">
      {{ locales all="true" current_first="true" }}
        <a
          href="{{ if permalink }}{{ permalink }}{{ else }}{{ locale:url }}{{ /if }}"
          hreflang="{{ locale:short }}"
          lang="{{ locale:short }}"
          class="flex items-center justify-between rounded-[14px] px-3 py-2 text-left text-[12px] font-medium leading-none transition-all {{ if is_current }}bg-primary-900 text-white{{ else }}text-black hover:bg-primary-900/10 hover:text-primary-900{{ /if }}">
          <span>{{ locale:name }}</span>
          <span class="text-[10px] uppercase tracking-[0.18em]">{{ locale:short }}</span>
        </a>
      {{ /locales }}
    </div>
  </div>
</details>
