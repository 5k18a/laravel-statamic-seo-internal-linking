<section class="overflow-hidden relative 2xl:mb-[100px] 1xl:mb-20 lg:mb-[60px] md:mb-[50px] mb-8">
                <div class="container">
                    <h2 class="xl:mb-10 md:mb-7 mb-5">{{ section_title }}</h2>
                    <!-- Timeline Container -->
                    <div class="relative" data-aos="fade-up">
                        <!-- Vertical Line -->
                        <div class="absolute left-1/2 2xl:top-54 1xl:top-50 xl:top-46 top-40 1xl:bottom-53 xl:bottom-46 bottom-42 transform -translate-x-1/2 w-0.5 bg-primary-900 lg:flex hidden">
                        </div>
                        {{ steps }}
                        <!-- Step 1 - Submit Your Application -->
                        {{ if layout == 'right' }}
                        <div class="relative 1xl:mb-16 sm:mb-10 mb-8" data-aos="fade-up">
                            <div class="flex items-center justify-between lg:flex-row flex-col lg:gap-0 gap-6">
                                <!-- Left Image Column -->
                                <div class="2xl:w-[42.5%] 1xl:w-[43%] xl:w-[44%] lg:w-[45.5%] w-full 2xl:mr-[130px] 1xl:mr-[90px] xl:mr-18 lg:mr-10 mr-0 h-full relative overflow-hidden 2xl:before:pt-[55%] xl:before:pt-[68%] lg:before:pt-[75%] before:pt-[55%] before:block">
                                    <img src="{{ image }}{{ url }}{{ /image }}" alt="Person with laptop" class="absolute top-0 bottom-0 right-0 left-0 w-full h-full object-cover" />
                                </div>

                                <!-- Circle -->
                                <div class="lg:flex hidden absolute left-1/2 transform top-1/2 -translate-1/2 1xl:w-[31px] 1xl:h-[31px] xl:w-7 xl:h-7 w-[22px] h-[22px] bg-white border-2 border-primary-900 rounded-full z-10">
                                </div>

                                <!-- Right Text Column -->
                                <div class="lg:w-1/2 w-full 2xl:pl-[100px] 1xl:pl-[80px] xl:pl-[70px] lg:pl-10 pl-0 2xl:py-[70px] 1xl:py-11 xl:py-9 lg:py-5 py-0">
                                    <div class="flex items-start mb-2">
                                        <h3 class="xl:mb-3 mb-2 font-normal">
                                            {{ title }}
                                        </h3>
                                    </div>
                                    <p class="text-gray-400">{{ description }}</p>
                                </div>
                            </div>
                        </div>
                        {{ else }}
                        <!-- Step 2 - Submit Your Application  -->
                        <div class="relative 1xl:mb-16 sm:mb-10 mb-8" data-aos="fade-up">
                            <div class="flex items-center justify-between lg:flex-row flex-col-reverse lg:gap-0 gap-6">
                                <!-- Left Content -->
                                <div
                                    class="lg:w-1/2 w-full 2xl:pr-[130px] 1xl:pr-[95px] xl:pr-20 lg:pr-10 pr-0 2xl:py-[70px] 1xl:py-11 xl:py-9 lg:py-5 py-0">
                                    <div class="flex items-start mb-2">
                                        <h3 class="xl:mb-3 mb-2 font-normal">
                                             {{ title }}
                                        </h3>
                                    </div>
                                    <p class="text-gray-400">{{ description }}</p>
                                </div>
                                <!-- Circle -->
                                <div
                                    class="lg:flex hidden absolute left-1/2 transform top-1/2 -translate-1/2 1xl:w-[31px] 1xl:h-[31px] xl:w-7 xl:h-7 w-[22px] h-[22px] bg-white border-2 border-primary-900 rounded-full z-10">
                                </div>
                                <!-- Right Content -->
                                <div
                                    class="2xl:w-[42.5%] 1xl:w-[43%] xl:w-[44%] lg:w-[45.5%] w-full 2xl:ml-[130px] 1xl:ml-[90px] xl:ml-18 lg:ml-10 ml-0 h-full relative overflow-hidden 2xl:before:pt-[55%] xl:before:pt-[68%] lg:before:pt-[75%] before:pt-[55%] before:block">
                                    <img src="{{ image }}{{ url }}{{ /image }}" alt="Person with laptop"
                                        class="absolute top-0 bottom-0 right-0 left-0 w-full h-full object-cover" />
                                </div>
                            </div>
                        </div>
                        {{ /if }}
                        {{ /steps }}
                    </div>
                </div>
            </section>
