<section class="our-explore-worked-section relative 2xl:mb-[100px] 1xl:mb-20 lg:mb-[70px] md:mb-[50px] mb-8 z-1 pt-10 lg:bg-white bg-primary-900 2xl:pb-[128px] 1xl:pb-[95px] xl:pb-[77px] lg:pb-[46px] pb-0">
    <div class="container relative">
        <div class="lg:bg-primary-900 flex flex-wrap lg:flex-row flex-col-reverse justify-between relative">
            <!-- left side content -->
            <div class="lg:w-[49%] w-full lg:px-5 lg:pl-10 xl:px-12 1xl:px-16 2xl:px-20 2xl:pt-[150px] 1xl:pt-[60px] 1xl:pb-[70px] xl:pt-[50px] xl:pb-[140px] md:pt-10 sm:pt-8 pt-6 lg:pb-[95px] pb-10 z-1 relative">
                <h2 class="sm:w-4/5 2xl:mb-[32px] 1xl:mb-5 xl:mb-[18px] lg:mb-2 mb-[18px] text-white">
                    {{ section_title }}
                </h2>
                <p class="text-white 1xl:mb-9 xl:first-letter:mb-7 mb-[25px]">
                    {{ section_description }}
                </p>
                {{ if button_text }}
                <div class="w-fit">
                    <a href="{{ button_page }}{{ url }}{{ /button_page }}" class="2xl:!py-3.5 xl:!py-3 lg:!py-2.5 sm:!py-2 !py-[7px] btn btn-green-bg">{{ button_text }}</a>
                </div>
                {{ /if }}
            </div>
            <!-- right side images -->
            <div class="w-full xl:w-[48%] lg:w-[49%] z-2">
                <div class="grid lg:gap-x-[22px] 1xl:gap-x-8 2xl:gap-x-7 lg:gap-y-0 sm:gap-9 gap-3 grid-cols-2 xl:-mt-10 lg:-mt-7 2xl:-mb-32 lg:-mb-24 lg:-mr-8 z-1 relative">
                    {{ gallery_images }}
                    <div class="flex items-center justify-center w-full">
                        {{ if first || last }}
                        <div class="overflow-hidden relative 2xl:before:pt-[120%] xl:before:pt-[110%] lg:before:pt-[120%] before:pt-[100%] before:block w-full">
                            {{ elseif index == 1 }}
                            <div class="overflow-hidden relative 2xl:before:pt-[110%] lg:before:pt-[106%] before:pt-[100%] before:block w-full lg:w-[80%] 2xl:mt-[70px] 1xl:mr-[60px] xl:mt-[60px] lg:mt-[48px] lg:mr-[52px]">
                                {{ else }}
                                <div class="overflow-hidden relative 2xl:before:pt-[120%] xl:before:pt-[110%] lg:before:pt-[120%] before:pt-[100%] before:block w-full lg:w-[80%] lg:ml-10">
                                    {{ /if }}

                                    <img src="{{ url }}" alt="img" class="absolute top-0 left-0 w-full h-full block object-cover" loading="lazy" />
                                </div>
                            </div>
                            {{ /gallery_images }}
                        </div>
                    </div>
                </div>
                <!-- customer's review -->
                <div class="lg:max-w-auto md:max-w-[64%] sm:max-w-[72%] max-w-[280px] md:w-auto w-full lg:absolute relative 2xl:px-10 1xl:px-8 px-[22px] 2xl:py-[30px] xl:py-[22px] py-4 lg:rounded-tr-none 2xl:rounded-tl-[50px] rounded-t-[40px] lg:gap-0 gap-[18px] flex sm:flex-nowrap flex-wrap items-center justify-center -bottom-[1px] 2xl:left-[39.5%] 1xl:left-[38%] xl:left-[37.3%] lg:left-[34%] left-1/2 -translate-x-1/2 z-1 bg-white">
                    <div class="flex items-center justify-center 1xl:mr-8 md:mr-5 sm:w-auto w-full customer-review-image">
                        {{ customer_images }}
                        <div class="customer">
                            <img src="{{ url }}" alt="customer" class="w-full h-full object-cover" loading="lazy" />
                        </div>
                        {{ /customer_images }}
                    </div>
                    <h3 class="mb-0 shrink-0 text-primary-900 md:mr-[15px]">{{ review_count }}</h3>
                    <p class="font-light">{{ review_text }}</p>
                </div>
            </div>
        </section>
