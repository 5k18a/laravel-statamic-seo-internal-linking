<section class="2xl:mb-[100px] 1xl:mb-20 lg:mb-[70px] sm:mb-[50px] mb-10">
    <div class="container">
        <div class="flex justify-between md:flex-row flex-col-reverse md:border-b border-[#00000026]">

                <div class="xl:pb-[131px] lg:pb-[60px] md:pb-[30px] xl:pt-[60px] md:pt-12 pt-8">
                    <h2 class="lg:mb-[24px] sm:mb-5 mb-3 2xl:w-[85%] xl:w-[70%]">{{ heading }}</h2>
                    <p class="text-[#464343]">{{ description }}</p>
                    <div class="flex items-center flex-wrap xl:gap-[30px] gap-3 xl:mt-10 mt-7">
                        {{ if primary_button:label }}<a href="{{ primary_button:url }}" class="btn btn-primary">{{ primary_button:label }}</a>{{ /if }}
                        {{ if contact_button:phone_label }}

            <div class="w-full 2xl:w-[35%] 1xl:w-[39%] xl:w-[43%] md:w-6/12 sm:w-[65%] relative md:ml-auto md:mr-0 mt-auto mx-auto mb-0 h-full">

            </div>
        </div>
    </div>
</section>
