    <section class="relative overflow-hidden 2xl:mb-[100px] 1xl:mb-20 lg:mb-[70px] md:mb-[50px] mb-8">
        <div class="container">
            <div class="flex items-start justify-between lg:flex-row flex-col lg:gap-10 sm:gap-6 gap-4.5 lg:mb-[60px] md:mb-[40px] mb-[30px]">
                <div class="lg:w-1/2 w-full">
                    <h2 class="1xl:mb-[55px] lg:mb-[44px] md:mb-6 mb-5 w-full lg:max-w-[90%]">
                        {{ video_section:shot_description }}
                    </h2>
                    <div class="flex items-center sm:flex-nowrap flex-wrap sm:gap-4 gap-3">
                        {{ if buttons:primary_button_text }} <a href="{{ buttons:primary_button_url }}" class="btn btn-primary">{{ buttons:primary_button_text }}</a>{{ /if }}

                        {{ if buttons:secondary_button_text }}
                        <a href="{{ buttons:secondary_button_link }}"
                        class="btn btn-green-bg sm:gap-3 gap-1.5 max-[425px]:px-0 !font-light">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" class="xl:w-6 xl:h-6 sm:w-[22px] sm:h-[22px] w-[18px] h-[18px] stroke-primary-900">
                            <path d="M13 2C15.3869 2 17.6761 2.94821 19.364 4.63604C21.0518 6.32387 22 8.61305 22 11M13 6C14.3261 6 15.5979 6.52678 16.5355 7.46447C17.4732 8.40215 18 9.67392 18 11M13.832 16.568C14.0385 16.6628 14.2712 16.6845 14.4917 16.6294C14.7122 16.5744 14.9073 16.4458 15.045 16.265L15.4 15.8C15.5863 15.5516 15.8279 15.35 16.1056 15.2111C16.3833 15.0723 16.6895 15 17 15H20C20.5304 15 21.0391 15.2107 21.4142 15.5858C21.7893 15.9609 22 16.4696 22 17V20C22 20.5304 21.7893 21.0391 21.4142 21.4142C21.0391 21.7893 20.5304 22 20 22C15.2261 22 10.6477 20.1036 7.27208 16.7279C3.89642 13.3523 2 8.7739 2 4C2 3.46957 2.21071 2.96086 2.58579 2.58579C2.96086 2.21071 3.46957 2 4 2H7C7.53043 2 8.03914 2.21071 8.41421 2.58579C8.78929 2.96086 9 3.46957 9 4V7C9 7.31049 8.92771 7.61672 8.78885 7.89443C8.65 8.17214 8.44839 8.41371 8.2 8.6L7.732 8.951C7.54842 9.09118 7.41902 9.29059 7.36579 9.51535C7.31256 9.74012 7.33878 9.97638 7.44 10.184C8.80668 12.9599 11.0544 15.2048 13.832 16.568Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                        <span>{{ buttons:secondary_button_text }}</span>
                    </a>
                    {{ /if }}
                </div>
            </div>
            <div class="lg:w-[49%] w-full xl:space-y-7 space-y-5">
                <p class="text-gray-400">{{ description }}</p>
                <ul class="space-y-2.5 custom-list">
                    {{ highlights }}
                    <li>
                        <p class="flex items-center xl:gap-3 gap-2 text-black">{{ text_field }}</p>
                    </li>
                    {{ /highlights }}
                </ul>
            </div>
        </div>

        <!-- Thumbnail with Play Button -->
        <div class="relative w-full 2xl:h-[750px] xl:h-[600px] lg:h-[535px] md:h-[425px] sm:h-[350px] h-[300px]">
            <!-- Thumbnail -->
            <img id="videoThumbnail" src="{{ video_section:video_thumbnail }} {{ url }} {{ /video_section:video_thumbnail }}" alt="Video Thumbnail" class="w-full h-full object-cover" loading="lazy" />

            <!-- Play Button -->
            <button id="playBtn" class="absolute inset-0 flex items-center justify-center">
                <div class="bg-[#FFFFFFB2] border border-white backdrop-blur-sm rounded-full xl:w-[80px] xl:h-[80px] sm:w-[70px] sm:h-[70px] w-[60px] h-[60px] flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none" class="ml-1.5 xl:w-10 xl:h-10 sm:w-9 sm:h-9 w-7 h-7 fill-primary-900 stroke-primary-900">
                        <path d="M13.812 9.07404C13.6298 8.96602 13.4223 8.90815 13.2105 8.9063C12.9987 8.90445 12.7902 8.95869 12.6061 9.06351C12.4221 9.16833 12.269 9.32 12.1626 9.50311C12.0561 9.68621 12 9.89424 12 10.106V37.894C12 38.1058 12.0561 38.3139 12.1626 38.497C12.269 38.6801 12.4221 38.8317 12.6061 38.9366C12.7902 39.0414 12.9987 39.0956 13.2105 39.0938C13.4223 39.0919 13.6298 39.0341 13.812 38.926L37.258 25.032C37.4371 24.9258 37.5854 24.7748 37.6884 24.5938C37.7915 24.4129 37.8456 24.2083 37.8456 24C37.8456 23.7918 37.7915 23.5872 37.6884 23.4062C37.5854 23.2253 37.4371 23.0743 37.258 22.968L13.812 9.07404Z" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </div>
            </button>

            <!-- Video (hidden initially) -->
            <video id="videoPlayer" controls class="w-full h-full object-cover hidden">
                <source src="{{ video_section:video_file }} {{ url }} {{ /video_section:video_file }}" type="video/mp4" />
            </video>
        </div>
    </div>
</section>
