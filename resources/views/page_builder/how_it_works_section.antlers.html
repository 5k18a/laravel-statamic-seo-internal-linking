 <section class="relative bg-[#F6F6F6] 2xl:mb-[100px] 1xl:mb-20 lg:mb-[70px] sm:mb-[50px] mb-10 2xl:py-[100px] 1xl:py-20 lg:py-[70px] sm:py-[50px] py-10">
    <div class="container">
        <h2 class="1xl:mb-11 mb-7 lg:w-[85%]">{{ heading }}</h2>
        <div class="grid lg:grid-cols-3 sm:grid-cols-2 grid-cols-1 2xl:gap-9 1xl:gap-7.5 md:gap-7 sm:gap-6 gap-[22px]">
            {{ steps }}
            <div class="2xl:p-10 1xl:p-8 sm:p-6 p-5 relative bg-white shadow-card" data-aos="fade-up">
                <div class="flex items-start w-fit">
                    <h2 class="text-primary-900 1xl:mb-[22px] md:mb-5 mb-2">
                     {{ step_number }}
                 </h2>
             </div>
             <h4 class="mb-2 1xl:mb-4">{{ title }}</h4>
             <p class="m-0 text-[#464343]">{{ description }}</p>
         </div>
         {{ /steps }}
     </div>
 </div>
</section>
