  <section class="overflow-hidden relative 2xl:mb-[100px] 1xl:mb-20 lg:mb-[60px] md:mb-[50px] mb-8">
                <div class="container">
                    <h2 class="xl:mb-10 md:mb-7 mb-5">{{ section_title }}</h2>
                    <div class="grid xl:grid-cols-3 md:grid-cols-2 grid-cols-1 2xl:gap-10 1xl:gap-8 lg:gap-7 gap-5">
                        <!-- 1st Card -->
                         {{ collection:job_positions }}
                        <div class="border border-[#00000026] 2xl:px-[36px] 2xl:py-[32px] 1xl:p-7 sm:p-5 p-[18px] w-full">
                            <h4 class="xl:pb-4 pb-3 border-b border-[#0000001A] xl:mb-6 mb-4">
                               {{ title }}
                            </h4>
                            {{ if details }}
                            <ul class="custom-list 1xl:space-y-3 space-y-2.5 2xl:mb-[25px] xl:mb-5 mb-3">
                                {{ details }}
                                <li class="flex items-start 2xl:gap-3 gap-2 text-gray-400">
                                    <p>
                                        <span class="font-normal text-black">{{ label }}</span>
                                        {{ value }}
                                    </p>
                                </li>
                                {{ /details }}
                            </ul>
                            {{ /if }}
                            <p class="2xl:mb-8 mb-6 text-gray-400">
                                {{ description }}
                            </p>
                            {{ if apply_button_label}}<a href="javascript:void(0)" class="apply-btn btn btn-primary job_btn" data-job-id="{{ id }}">{{ apply_button_label }}</a>{{ /if }}
                        </div>
                        {{ /collection:job_positions }}
                    </div>
                </div>
            </section>
