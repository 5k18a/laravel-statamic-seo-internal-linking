tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              display: Title
          -
            handle: sub_title
            field:
              type: text
              display: 'Sub Title'
          -
            handle: short_description
            field:
              type: text
              display: 'Short Description'
          -
            handle: button_link
            field:
              default: /
              type: text
              display: 'Button Link'
          -
            handle: button_text
            field:
              default: 'Back to Home'
              type: text
              display: 'Button Text'
