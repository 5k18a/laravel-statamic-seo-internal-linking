title: Gallery
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              validate:
                - required
          -
            handle: image
            field:
              min_files: 1
              container: assets
              type: assets
              display: Image
          -
            handle: url
            field:
              default: 'javascript:;'
              type: text
              display: url
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: slug
            field:
              type: slug
              localizable: true
              validate: 'max:200'
          -
            handle: gallery_tags
            field:
              type: terms
              taxonomies:
                - gallery_tags
              create: true
              mode: select
              display: 'Tagi (sekcje)'
              instructions: 'Przypisz galerię do tagów/sekcji (możesz wpisać nowy tag — zostanie utworzony). Zarządzanie wszystkimi tagami: CP → Taxonomies → Gallery Tags.'
              localizable: false
