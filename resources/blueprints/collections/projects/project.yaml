title: Project
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              validate:
                - required
              localizable: false
          -
            handle: image
            field:
              type: assets
              display: 'Featured Image'
              max_files: 1
              container: assets
              folder: images/projects
              localizable: false
          -
            handle: details
            field:
              type: replicator
              display: Details
              listable: true
              collapse: true
              localizable: false
              sets:
                main:
                  display: Main
                  sets:
                    info_item:
                      display: 'Info Item'
                      fields:
                        -
                          handle: label
                          field:
                            type: text
                            display: Label
                            placeholder: 'e.g. Status, Size, Location'
                        -
                          handle: value
                          field:
                            type: text
                            display: Value
                            placeholder: 'e.g. Dubai, UAE'
          -
            handle: overview_section
            field:
              type: group
              display: 'Overview Section'
              listable: true
              localizable: false
              fields:
                -
                  handle: overview_title
                  field:
                    default: 'Opis Projektu'
                    type: text
                    display: 'Overview Title'
                    localizable: false
                -
                  handle: overvie
                  field:
                    remove_empty_nodes: false
                    type: bard
                    display: Overview
                    localizable: false
          -
            handle: project_highlights
            field:
              type: group
              display: 'Project Highlights'
              localizable: false
              fields:
                -
                  handle: project_highlights_title
                  field:
                    default: 'Zakres Prac:'
                    type: text
                    display: 'Project Highlights Title'
                    localizable: false
                -
                  handle: highlights
                  field:
                    collapse: true
                    type: replicator
                    display: Highlights
                    localizable: false
                    sets:
                      new_set_group:
                        display: 'New Set Group'
                        sets:
                          new_set:
                            display: 'New Set'
                            fields:
                              -
                                handle: highlight_text
                                field:
                                  type: text
                                  display: 'Highlight Text'
                                  listable: true
          -
            handle: gallery_section
            field:
              type: group
              display: 'Gallery Section'
              localizable: false
              fields:
                -
                  handle: gallery_title
                  field:
                    default: Galeria
                    type: text
                    display: 'Gallery Title'
                    localizable: false
                -
                  handle: images
                  field:
                    min_files: 1
                    container: assets
                    type: assets
                    display: Images
                    localizable: false
          -
            handle: show_milestones
            field:
              type: toggle
              display: 'Show Project Milestones'
              localizable: false
          -
            handle: project_milestones
            field:
              type: group
              display: 'Project Milestones'
              sortable: false
              listable: true
              if:
                show_milestones: true
              localizable: false
              fields:
                -
                  handle: project_milestones_title
                  field:
                    default: 'Project Milestones'
                    type: text
                    display: 'Project Milestones Title'
                -
                  handle: project_milestones
                  field:
                    type: replicator
                    display: 'Project Milestones'
                    sets:
                      new_set_group:
                        display: 'New Set Group'
                        sets:
                          new_set:
                            display: 'New Set'
                            fields:
                              -
                                handle: year_range
                                field:
                                  placeholder: 'e.g. 2021 – 2025'
                                  type: text
                                  display: 'Year Range'
                              -
                                handle: title
                                field:
                                  type: text
                                  display: Title
                              -
                                handle: background_image
                                field:
                                  max_files: 1
                                  container: assets
                                  type: assets
                                  display: 'Background Image'
                              -
                                handle: description
                                field:
                                  type: markdown
                                  display: Description
          -
            handle: show_team_section
            field:
              type: toggle
              display: 'Show Team Section'
              localizable: false
          -
            handle: team_section
            field:
              type: group
              display: 'Team Section'
              listable: true
              if:
                show_team_section: true
              localizable: false
              fields:
                -
                  handle: professional_team_title
                  field:
                    default: 'Professional Team'
                    type: text
                    display: 'Professional Team Title'
                -
                  handle: button_text
                  field:
                    default: 'View all Members'
                    type: text
                    display: 'Button Text'
                -
                  handle: collections
                  field:
                    max_items: 1
                    mode: select
                    type: collections
                    display: 'Team Collections'
          -
            handle: show_related_projects
            field:
              type: toggle
              display: 'Show Related Projects'
              localizable: false
          -
            handle: related_projects
            field:
              type: group
              display: 'Related Projects'
              listable: true
              if:
                show_related_projects: true
              localizable: false
              fields:
                -
                  handle: related_project_title
                  field:
                    default: 'Related Projects'
                    type: text
                    display: 'Related Project Title'
                -
                  handle: button_text
                  field:
                    default: 'View All Projects'
                    type: text
                    display: 'Button Text'
                -
                  handle: related_project
                  field:
                    mode: select
                    collections:
                      - projects
                    type: entries
                    display: 'Related Project'
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: slug
            field:
              type: slug
              localizable: true
              validate: 'max:200'
          -
            handle: completion_year
            field:
              type: integer
              display: 'Rok zakończenia (sortowanie)'
              instructions: 'Rok używany wyłącznie do sortowania listy projektów. Nie wyświetla się na stronie. Dla projektów wieloetapowych wpisz rok ostatniego etapu.'
              localizable: false
              listable: false
              validate: 'nullable|integer|min:1990|max:2099'
  'SEO Meta':
    display: 'SEO Meta'
    sections:
      -
        fields:
          -
            handle: seo
            field:
              type: seo_pro
              listable: false
              display: SEO
              localizable: false
  'SEO Previews':
    display: 'SEO Previews'
    sections:
      -
        fields:
          -
            handle: seo_previews
            field:
              type: seo_pro_previews
              listable: false
              display: 'SEO Previews'
              localizable: false
              hide_display: true
              unless:
                seo.enabled: 'equals false'
