title: 'Internal Link'
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              display: 'Nazwa (administracyjna, nie wyświetlana)'
              instructions: 'Np. "Skały do akwarium → Strona Dekoracje Akwarystyczne". Linkowanie działa wyłącznie w treści wpisów blogowych.'
              validate:
                - required
          -
            handle: target_entry
            field:
              type: entries
              display: 'Strona docelowa'
              instructions: 'Wybierz wpis do którego linki będą podstawiane. URL dopasuje się automatycznie do języka strony.'
              max_items: 1
              collections:
                - pages
                - services
                - projects
              required: true
              validate:
                - required
          -
            handle: keywords
            field:
              type: replicator
              display: 'Słowa kluczowe'
              instructions: 'Dodaj słowa kluczowe dla każdego języka. Pole "Język" zostaw puste jeśli słowo działa dla wszystkich języków.'
              sets:
                main:
                  sets:
                    keyword:
                      display: 'Słowo kluczowe'
                      fields:
                        -
                          handle: keyword
                          field:
                            type: text
                            display: 'Słowo / fraza'
                            instructions: 'Np. "sztuczne skały", "artificial rocks"'
                            required: true
                            validate:
                              - required
                        -
                          handle: locale
                          field:
                            type: select
                            display: 'Język'
                            instructions: 'Zostaw puste = działa we wszystkich językach'
                            placeholder: 'Wszystkie języki'
                            clearable: true
                            options:
                              pl: 'Polski (pl)'
                              en: 'English (en)'
                              de: 'Deutsch (de)'
                              fr: 'Français (fr)'
                              es: 'Español (es)'
                              it: 'Italiano (it)'
                              nl: 'Nederlands (nl)'
                              sv: 'Svenska (sv)'
                              no: 'Norsk (no)'
                              da: 'Dansk (da)'
                              lv: 'Latviešu (lv)'
                              cs: 'Čeština (cs)'
              required: true
              validate:
                - required
              min_sets: 1
          -
            handle: weight
            field:
              type: integer
              display: 'Priorytet (waga)'
              instructions: 'Wyższy = pierwszy podmieniany przy konflikcie keywords.'
              default: 0
          -
            handle: nofollow
            field:
              type: toggle
              display: 'nofollow'
              default: false
          -
            handle: open_in_new_window
            field:
              type: toggle
              display: 'Otwieraj w nowej karcie'
              default: false
          -
            handle: enabled
            field:
              type: toggle
              display: 'Aktywne'
              default: true
