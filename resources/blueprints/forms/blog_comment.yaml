tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: blog_id
            field:
              default: 'null'
              type: text
              display: 'Blog Id'
          -
            handle: first_name
            field:
              type: text
              display: 'First Name'
              validate:
                - required
          -
            handle: last_name
            field:
              type: text
              display: 'Last Name'
              validate:
                - required
          -
            handle: email
            field:
              type: text
              display: 'Email Address'
              validate:
                - required
                - email
          -
            handle: your_website
            field:
              type: text
              display: 'Your Website'
          -
            handle: message
            field:
              type: textarea
              display: 'Your Comment'
              validate:
                - required
          -
            handle: image
            field:
              max_files: 1
              container: assets
              type: assets
              display: Image
          -
            handle: parent_id
            field:
              default: 'null'
              type: text
              display: 'Parent Id'
