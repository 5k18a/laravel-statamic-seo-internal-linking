title: 'Logos Slider'
fields:
  -
    handle: logos
    field:
      type: replicator
      display: 'Logos Slider Items'
      instructions: 'Add logos and their descriptions for the slider'
      sets:
        main:
          display: Main
          sets:
            logo_item:
              display: 'Logo Item'
              fields:
                -
                  handle: image
                  field:
                    type: assets
                    display: 'Logo Image'
                    mode: single
                    validate:
                      - required
                -
                  handle: name
                  field:
                    type: text
                    display: 'Logo Name / Description'
                    validate:
                      - required
