title: 'Service Section'
fields:
  -
    handle: show_type
    field:
      options:
        -
          key: home-page-one
          value: 'Home One'
        -
          key: home-page-two
          value: 'Home Two'
        -
          key: home-page-three
          value: 'Home Three'
        -
          key: home-page-four
          value: 'Home Four'
        -
          key: service-page-one
          value: 'Service One'
        -
          key: service-page-two
          value: 'Service Two'
        -
          key: service-page-three
          value: 'Service Three'
      default: home-page-one
      type: select
      display: 'Show Type'
  -
    handle: sub_title
    field:
      type: text
      display: 'Sub Title'
  -
    handle: button_text
    field:
      default: 'View all Services'
      type: text
      display: 'Button Text'
  -
    handle: button_entry
    field:
      type: entries
      display: 'Strona docelowa buttona'
      instructions: 'Wybierz stronę (np. Oferta / Services) — URL dopasuje się automatycznie do języka. Jeśli puste, button nie wyświetli się.'
      max_items: 1
      collections:
        - pages
  -
    handle: collections
    field:
      max_items: 1
      mode: select
      type: collections
      display: 'Kolekcja źródłowa (skąd brać wpisy do wyświetlenia)'
  -
    handle: limit
    field:
      default: '0'
      type: integer
      display: Limit
