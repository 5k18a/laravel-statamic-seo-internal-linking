title: 'Free Text Section'
fields:
  -
    handle: width
    field:
      options:
        -
          key: full
          value: 'Pełna szerokość'
        -
          key: full_no_padding
          value: 'Pełna szerokość bez ramki'
        -
          key: '90'
          value: '90% szerokości'
        -
          key: '75'
          value: '75% szerokości'
        -
          key: '66'
          value: '66% szerokości (2/3)'
        -
          key: '50'
          value: '50% szerokości'
      default: full
      type: select
      display: 'Szerokość bloku'
  -
    handle: background_color
    field:
      type: color
      display: 'Kolor tła'
      instructions: 'Pozostaw puste dla przezroczystego tła'
  -
    handle: layout_mode
    field:
      type: select
      display: 'Układ treści'
      options:
        -
          key: single
          value: 'Jedna kolumna'
        -
          key: columns
          value: 'Podział na kolumny'
      default: single
  -
    handle: content
    field:
      type: wysiwyg_html
      display: 'Treść'
      container: assets
      localizable: true
      if:
        layout_mode: 'not columns'
  -
    handle: columns_layout
    field:
      type: select
      display: 'Liczba kolumn'
      options:
        -
          key: '2'
          value: '2 kolumny'
        -
          key: '3'
          value: '3 kolumny'
        -
          key: '4'
          value: '4 kolumny'
      default: '2'
      if:
        layout_mode: 'equals columns'
  -
    handle: columns
    field:
      type: replicator
      display: 'Kolumny'
      collapse: false
      localizable: true
      sets:
        column:
          display: 'Kolumna'
          fields:
            -
              handle: content
              field:
                type: wysiwyg_html
                display: 'Treść'
                container: assets
      if:
        layout_mode: 'equals columns'
