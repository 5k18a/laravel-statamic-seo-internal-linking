title: 'Free Text Section'
fields:
  -
    handle: width
    field:
      options:
        -
          key: full
          value: 'Pełna szerokość'
        -
          key: full_no_padding
          value: 'Pełna szerokość bez ramki'
        -
          key: '90'
          value: '90% szerokości'
        -
          key: '75'
          value: '75% szerokości'
        -
          key: '66'
          value: '66% szerokości (2/3)'
        -
          key: '50'
          value: '50% szerokości'
      default: full
      type: select
      display: 'Szerokość bloku'
  -
    handle: background_color
    field:
      type: color
      display: 'Kolor tła'
      instructions: 'Pozostaw puste dla przezroczystego tła'
  -
    handle: layout_mode
    field:
      type: select
      display: 'Układ treści'
      options:
        -
          key: single
          value: 'Jedna kolumna'
        -
          key: columns
          value: 'Podział na kolumny'
      default: single
  -
    handle: content
    field:
      type: wysiwyg_html
      display: 'Treść'
      container: assets
      localizable: true
      if:
        layout_mode: 'not columns'
  -
    handle: columns_layout
    field:
      type: select
      display: 'Liczba kolumn'
      options:
        -
          key: '2'
          value: '2 kolumny'
        -
          key: '3'
          value: '3 kolumny'
        -
          key: '4'
          value: '4 kolumny'
      default: '2'
      if:
        layout_mode: 'equals columns'
  -
    handle: column_gap
    field:
      type: select
      display: 'Odstęp między kolumnami'
      instructions: 'Poziomy odstęp między sąsiadującymi kolumnami.'
      options:
        -
          key: none
          value: 'Bez odstępu (0)'
        -
          key: small
          value: 'Mały (16px)'
        -
          key: medium
          value: 'Średni (24px) — domyślny'
        -
          key: large
          value: 'Duży (40px)'
        -
          key: xl
          value: 'Bardzo duży (64px)'
      default: medium
      if:
        layout_mode: 'equals columns'
  -
    handle: column_padding
    field:
      type: select
      display: 'Padding wewnątrz kolumny'
      instructions: 'Wewnętrzny odstęp tekstu od krawędzi kolumny.'
      options:
        -
          key: none
          value: 'Brak — domyślny'
        -
          key: small
          value: 'Mały (12px)'
        -
          key: medium
          value: 'Średni (24px)'
        -
          key: large
          value: 'Duży (40px)'
      default: none
      if:
        layout_mode: 'equals columns'
  -
    handle: content_max_width
    field:
      type: select
      display: 'Maksymalna szerokość tekstu (długość linii)'
      instructions: 'Ogranicza szerokość bloku tekstu. „Optymalna" daje ~65 znaków/linia (najczytelniejsze dla długich tekstów). Działa w obu trybach układu.'
      options:
        -
          key: full
          value: 'Pełna szerokość — domyślny'
        -
          key: prose
          value: 'Optymalna (~65 znaków/linia)'
        -
          key: narrow
          value: 'Wąska (~45 znaków/linia)'
      default: full
  -
    handle: columns
    field:
      type: replicator
      display: 'Kolumny'
      collapse: false
      localizable: true
      sets:
        column:
          display: 'Kolumna'
          fields:
            -
              handle: content
              field:
                type: wysiwyg_html
                display: 'Treść'
                container: assets
      if:
        layout_mode: 'equals columns'
