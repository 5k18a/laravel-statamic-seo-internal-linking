description: 'Jesteśmy specjalistami w zakresie budowy sztucznych skał, sztucznych drzew, wodospadów, grot skalnych i dekoracji tematycznych z betonu. Projektujemy i wykonujemy biotopy dla ogrodów zoologicznych, dekoracje dla oceanariów i akwariów wielkolitrażowych oraz tematyzacje dla parków wodnych, parków rozrywki, hoteli i obiektów rekreacyjnych. Od ponad 15 lat realizujemy wielkoformatowe projekty tematyzacyjne w Polsce i Europie.'
