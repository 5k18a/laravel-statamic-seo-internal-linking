title: 'Internal Link'
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              display: 'Name (admin label, not displayed)'
              instructions: 'E.g. "Aquarium rocks → Decorative Aquariums page". Linking works in blog entry content only.'
              validate:
                - required
          -
            handle: target_entry
            field:
              type: entries
              display: 'Target page'
              instructions: 'Select the entry to link to. The URL resolves automatically to the current site language.'
              max_items: 1
              collections:
                - pages
                - services
                - projects
              required: true
              validate:
                - required
          -
            handle: keywords
            field:
              type: replicator
              display: 'Keywords'
              instructions: 'Add one row per keyword. Set Language to restrict a keyword to one locale, or leave empty to match all languages.'
              sets:
                main:
                  sets:
                    keyword:
                      display: 'Keyword'
                      fields:
                        -
                          handle: keyword
                          field:
                            type: text
                            display: 'Word / phrase'
                            instructions: 'E.g. "artificial rocks", "coral reef aquarium"'
                            required: true
                            validate:
                              - required
                        -
                          handle: locale
                          field:
                            type: select
                            display: 'Language'
                            instructions: 'Leave empty = matches all languages'
                            placeholder: 'All languages'
                            clearable: true
                            options:
                              pl: 'Polish (pl)'
                              en: 'English (en)'
                              de: 'German (de)'
                              fr: 'French (fr)'
                              es: 'Spanish (es)'
                              it: 'Italian (it)'
                              nl: 'Dutch (nl)'
                              sv: 'Swedish (sv)'
                              no: 'Norwegian (no)'
                              da: 'Danish (da)'
                              lv: 'Latvian (lv)'
                              cs: 'Czech (cs)'
              required: true
              validate:
                - required
              min_sets: 1
          -
            handle: weight
            field:
              type: integer
              display: 'Priority (weight)'
              instructions: 'Higher = processed first when keywords conflict.'
              default: 0
          -
            handle: nofollow
            field:
              type: toggle
              display: 'nofollow'
              default: false
          -
            handle: open_in_new_window
            field:
              type: toggle
              display: 'Open in new tab'
              default: false
          -
            handle: enabled
            field:
              type: toggle
              display: 'Active'
              default: true
